<!-- loggedPatientDashboard.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/svg+xml" href="../assets/images/logo/logo.png" />
    <title>LoggedPatientDashboard</title>
    <link rel = "stylesheet" href = "../assets/css/adminDashboard.css">
    <link rel = "stylesheet" href = "../assets/css/style.css">
    <link rel = "stylesheet" href = "../assets/css/patientDashboard.css">
    <script src = "../js/render.js" defer></script>
    <script src = "../js/util.js" defer></script>
    <script src = "../js/components/header.js" defer></script>
    <script src = "../js/components/footer.js" defer></script>
    <script type = "module" src = "../js/loggedPatient.js" defer></script>
</head>
<body onload="renderContent()">
    <div class="container">
        <div class="wrapper">
            <div id="header"></div>
            <main class="main-content">
                <input type="text" id="searchBar" class="searchBar" placeholder="Barra de busqueda para salida personalizada" />
                <div class="filter-wrapper">
                    <select class="filter-select" id="filterTime">
                        <option value="">Ordenar por fecha</option>
                        <option value="AM">AM</option>
                        <option value="PM">PM</option>
                    </select>
                    <select class="filter-select" id="filterSpecialty">
                        <option value="">Filtrar por especialidad</option>
                        <option value="Cardiologist">Cardiologo</option>
                        <option value="Dermatologist">Dermatologo</option>
                        <option value="Neurologist">Neurologo</option>
                        <option value="Pediatrician">Pediatra</option>
                        <option value="Orthopedic">Ortopedista</option>
                        <option value="Gynecologist">Ginecologo</option>
                        <option value="Psychiatrist">Psiquiatra</option>
                        <option value="Dentist">Dentista</option>
                        <option value="Ophthalmologist">Oftalmologo</option>
                        <option value="Ent">Otorrinolaringologo</option>
                        <option value="Urologist">Urologo</option>
                        <option value="Oncologist">Oncologo</option>
                        <option value="Gastroenterologist">Gastroenterologo</option>
                        <option value="General">Medicina general</option>
                    </select>
                </div>
                <div id="content"></div>
            </main>
            <div id="footer"></div>
        </div>
    </div>
</body>
</html>
